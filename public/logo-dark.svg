<svg width="860" height="210" viewBox="0 0 860 210" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon: purple rounded square -->
  <rect width="210" height="210" rx="36" fill="#a855f7"/>

  <!-- Agent-network Y-node: lines drawn first (behind circles) -->
  <line x1="105" y1="108" x2="105" y2="48" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="105" y1="108" x2="53"  y2="138" stroke="white" stroke-width="12" stroke-linecap="round"/>
  <line x1="105" y1="108" x2="157" y2="138" stroke="white" stroke-width="12" stroke-linecap="round"/>

  <!-- Hub circle (centre) -->
  <circle cx="105" cy="108" r="18" fill="white"/>

  <!-- Endpoint node circles -->
  <circle cx="105" cy="48"  r="12" fill="white"/>
  <circle cx="53"  cy="138" r="12" fill="white"/>
  <circle cx="157" cy="138" r="12" fill="white"/>

  <!-- Wordmark -->
  <text
    x="245"
    y="105"
    dominant-baseline="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="112"
    font-weight="700"
    letter-spacing="-1"
  >
    <tspan fill="#0f172a">agent</tspan><tspan fill="#a855f7">1o1</tspan>
  </text>
</svg>
